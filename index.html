function goToProduct() {

    const msg = document.getElementById("msg");

        msg.textContent = "اكتب رقم المنتج";
        msg.style.color = "orange";
        return;
    }

    if (products[code]) {
        msg.textContent = "جاري التحويل...";
        msg.style.color = "lightgreen";

        setTimeout(() => {
            window.location.href = products[code].link;
        }, 500);

        msg.style.color = "red";

}
