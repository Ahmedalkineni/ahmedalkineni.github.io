<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    color: #333;
}

.container {
    max-width: 420px;
    margin: 40px auto;
    padding: 30px;
    background: white;
    border-radius: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    text-align: center;
}

.logo {
    width: 140px;
    max-width: 100%;
    margin-bottom: 15px;
}

h1 {
    margin: 0;
    font-size: 28px;
    color: #2d5be3;
}

.subtitle {
    color: #777;
    margin: 10px 0 25px;
    font-size: 14px;
    line-height: 1.6;
}

.input-group {
    display: flex;
    gap: 10px;
}

.input-group input {
    flex: 1;
    padding: 14px;
    border: 2px solid #e5e7eb;
    border-radius: 14px;
    font-size: 16px;
    text-align: center;
    outline: none;
    transition: 0.3s;
}

.input-group input:focus {
    border-color: #2d5be3;
    box-shadow: 0 0 0 4px rgba(45,91,227,0.12);
}

.input-group button {
    padding: 14px 20px;
    border: none;
    border-radius: 14px;
    background: #2d5be3;
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.input-group button:hover {
    background: #2247b7;
}

#msg {
    margin-top: 15px;
    font-size: 14px;
    min-height: 20px;
}

.social-title {
    margin-top: 35px;
    margin-bottom: 15px;
    color: #666;
    font-size: 14px;
}

.social {
    display: flex;
    justify-content: center;
    gap: 15px;
}

.social a {
    width: 50px;
    height: 50px;
    background: #f4f6f9;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    text-decoration: none;
    color: #2d5be3;
    font-size: 24px;
    transition: 0.3s;
}

.social a:hover {
    transform: translateY(-4px);
    background: #2d5be3;
    color: white;
}

@media (max-width: 480px) {
    .container {
        margin: 20px;
        padding: 25px;
    }

    .input-group {
        flex-direction: column;
    }

    .input-group button {
        width: 100%;
    }
}
</style>
</head>

        return;
    }

        msg.style.color = "#2d5be3";
        msg.textContent = "جاري التحويل...";

        }, 500);

    } else {
        msg.style.color = "#e74c3c";
        msg.textContent = "رقم المنتج غير موجود.";
    }
}
