<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل المنتجات</title>

    <!-- أيقونات السوشيال ميديا -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        .logo {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 15px;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: #666;
        }

        input {
            width: 90%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 10px;
            margin-top: 20px;
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .social {
            margin-top: 30px;
        }

        .social a {
            color: #333;
            font-size: 28px;
            margin: 0 10px;
            text-decoration: none;
        }

        .social a:hover {
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- الشعار -->
        <img src="https://via.placeholder.com/150" alt="الشعار" class="logo">

        <h1>دليل المنتجات</h1>

        <p>أدخل رقم المنتج للانتقال مباشرة إلى صفحة الشراء</p>

        <input type="text" id="productCode" placeholder="مثال: 1001">

        <button onclick="goToProduct()">انتقال</button>

        <!-- أيقونات السوشيال ميديا -->
        <div class="social">
            <a href="https://wa.me/9665XXXXXXXX" target="_blank">
                <i class="fab fa-whatsapp"></i>
            </a>

            <a href="https://instagram.com/USERNAME" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>

            <a href="https://tiktok.com/@USERNAME" target="_blank">
                <i class="fab fa-tiktok"></i>
            </a>

            <a href="https://snapchat.com/add/USERNAME" target="_blank">
                <i class="fab fa-snapchat"></i>
            </a>
        </div>

    </div>

    <script>
        const links = {
            "1001": "https://example.com/product1",
            "1002": "https://example.com/product2",
            "1003": "https://example.com/product3"
        };

        function goToProduct() {
            const code = document.getElementById("productCode").value.trim();

            if (links[code]) {
                window.location.href = links[code];
            } else {
                alert("عذراً، رقم المنتج غير موجود.");
            }
        }

        // التحويل عند الضغط على Enter
        document.getElementById("productCode").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                goToProduct();
            }
        });
    </script>

</body>
</html>
