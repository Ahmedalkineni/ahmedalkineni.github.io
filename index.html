<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دليل المنتجات</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
    color: #fff;
    text-align: center;
}

/* الحاوية */
.container {
    max-width: 450px;
    margin: auto;
    padding: 20px;
}

/* العنوان */
h1 {
    color: gold;
    margin-top: 20px;
}

p {
    color: #bbb;
}

/* الإدخال */
input {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    border-radius: 12px;
    border: 1px solid #333;
    margin-top: 20px;
    outline: none;
    background: #1f1f1f;
    color: white;
}

/* الزر */
button {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    background: gold;
    color: #000;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.03);
    opacity: 0.9;
}

/* الرسالة */
#msg {
    margin-top: 10px;
    font-weight: bold;
}

/* السوشيال */
.social {
    margin-top: 25px;
}

.social a {
    color: gold;
    font-size: 28px;
    margin: 0 10px;
    transition: 0.3s;
    text-decoration: none;
}

.social a:hover {
    transform: scale(1.2);
}

/* صورة علوية */
.top img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-bottom-left-radius: 25px;
    border-bottom-right-radius: 25px;
}
</style>
</head>

<body>

<!-- صورة علوية -->
<div class="top">
    <img src="https://via.placeholder.com/800x400" alt="banner">
</div>

<div class="container">

    <h1>دليل المنتجات</h1>
    <p>أدخل رقم المنتج للانتقال مباشرة</p>

    <input type="number" id="productCode" placeholder="مثال: 1001">

    <button onclick="goToProduct()">انتقال</button>

    <p id="msg"></p>

    <!-- سوشيال -->
    <div class="social">
        <a href="https://wa.me/9665XXXXXXXX" target="_blank">WhatsApp</a>
        <a href="https://instagram.com/USERNAME" target="_blank">Instagram</a>
        <a href="https://tiktok.com/@USERNAME" target="_blank">TikTok</a>
    </div>

</div>

<script>
const links = {
    "1001": "https://example.com/product1",
    "1002": "https://example.com/product2",
    "1003": "https://example.com/product3"
};

function goToProduct() {
    const code = document.getElementById("productCode").value.trim();
    const msg = document.getElementById("msg");

    if (code === "") {
        msg.textContent = "اكتب رقم المنتج";
        msg.style.color = "orange";
        return;
    }

    if (links[code]) {
        msg.textContent = "جاري التحويل...";
        msg.style.color = "lightgreen";

        setTimeout(() => {
            window.location.href = links[code];
        }, 500);

    } else {
        msg.textContent = "رقم المنتج غير موجود";
        msg.style.color = "red";
    }
}

// دعم زر Enter
document.getElementById("productCode").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        goToProduct();
    }
});
</script>

</body>
</html>
