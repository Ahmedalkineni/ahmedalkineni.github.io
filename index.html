<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دليل المنتجات</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: #fff;
    text-align: center;
}

/* الحاوية */
.container {
    max-width: 450px;
    margin: auto;
    padding: 20px;
}

/* الصورة العلوية */
.top-banner img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-bottom-left-radius: 25px;
    border-bottom-right-radius: 25px;
}

/* العنوان */
h1 {
    margin-top: 20px;
    color: gold;
}

p {
    color: #bbb;
}

/* الإدخال */
input {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    margin-top: 20px;
    outline: none;
}

/* الزر */
button {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    background: gold;
    color: #000;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    opacity: 0.8;
}

/* رسالة الخطأ */
#msg {
    color: red;
    margin-top: 10px;
}

/* السوشيال */
.social {
    margin-top: 25px;
}

.social a {
    color: gold;
    font-size: 28px;
    margin: 0 10px;
    transition: 0.3s;
}

.social a:hover {
    transform: scale(1.2);
}

/* صور تحت */
.bottom-images {
    margin-top: 25px;
}

.bottom-images img {
    width: 100%;
    border-radius: 15px;
    margin-top: 10px;
}
</style>
</head>

<body>

<!-- صورة علوية -->
<div class="top-banner">
    <img src="https://via.placeholder.com/800x400" alt="banner">
</div>

<div class="container">

    <h1>دليل المنتجات</h1>
    <p>أدخل رقم المنتج للانتقال مباشرة</p>

    <input type="number" id="productCode" placeholder="مثال: 1001">

    <button onclick="goToProduct()">انتقال</button>

    <p id="msg"></p>

    <!-- سوشيال -->
    <div class="social">
        <a href="https://wa.me/9665XXXXXXXX" target="_blank"><i class="fab fa-whatsapp"></i></a>
        <a href="https://instagram.com/USERNAME" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://tiktok.com/@USERNAME" target="_blank"><i class="fab fa-tiktok"></i></a>
        <a href="https://snapchat.com/add/USERNAME" target="_blank"><i class="fab fa-snapchat"></i></a>
    </div>

    <!-- صور تحت -->
    <div class="bottom-images">
        <img src="https://via.placeholder.com/800x300" alt="">
        <img src="https://via.placeholder.com/800x300" alt="">
    </div>

</div>

<script>
const links = {
    "1001": "https://example.com/product1",
    "1002": "https://example.com/product2",
    "1003": "https://example.com/product3"
};

function goToProduct() {
    const code = document.getElementById("productCode").value.trim();
    const msg = document.getElementById("msg");

    if (links[code]) {
        msg.textContent = "";
        window.location.href = links[code];
    } else {
        msg.textContent = "رقم المنتج غير موجود";
    }
}

document.getElementById("productCode").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        goToProduct();
    }
});
</script>

</body>
</html>
